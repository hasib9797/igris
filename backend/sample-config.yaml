server:
  host: 0.0.0.0
  port: 2511
  https_enabled: false

auth:
  admin_username: admin
  password_hash: ""
  session_secret: ""
  session_timeout_minutes: 30
  admin_email: ""

system:
  managed_user: ubuntu
  allow_terminal: false
  allow_package_install: true
  allow_user_management: true
  allow_network_management: true
  allow_service_management: true

modules:
  docker: true
  alerts: true
  tasks: true
  files: true

security:
  trusted_subnets: []
  require_reauth_for_dangerous_actions: true
  audit_log_enabled: true

email:
  enabled: true
  recipient: ""

monitoring:
  enabled: true
  interval_seconds: 300
  cpu_threshold_percent: 85
  memory_threshold_percent: 90
  disk_threshold_percent: 90

updates:
  enabled: true
  auto_update: false
  check_interval_seconds: 120
  repo_url: https://github.com/hasib9797/igris
  branch: main

assistant:
  enabled: true
  provider: local-heuristic
  dry_run_default: true
  allow_execute: true

incidents:
  enabled: true
  interval_seconds: 180
  auto_remediation_rules: []

deploy:
  enabled: true
  nginx_sites_available: /etc/nginx/sites-available
  nginx_sites_enabled: /etc/nginx/sites-enabled
  backup_dir: /var/lib/igris/backups
  default_ssl_mode: letsencrypt
  cloudflare_api_token: ""
  letsencrypt_email: ""
